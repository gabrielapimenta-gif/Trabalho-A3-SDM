services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    ports:
      - "5000:5000"

    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management

    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker

    depends_on:
      - rabbitmq